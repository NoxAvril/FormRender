<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form Render</title>
        <link rel = "stylesheet" href = "public/css/style.css">
    </head>
    <body>
        <form action="https://teach-backend-fawn.vercel.app/api/product" 
            method="POST" 
            enctype="multipart/form-data">

            <fieldset>
                <legend>General Info</legend>
                <div class = "form-group">
                    <label for="itemName">Item Name</label>
                    <input type="text" name="itemName" id="itemName" required>
                </div>

                <div class = "form-group">
                    <label for="itemDescription">Description</label>
                    <textarea id="itemDescription" name="itemDescription"></textarea>
                </div>

                <div class = "form-group">
                    <label for="Category">Category</label>
                    <select name="category" id="category">
                        <option value="notSpecified">Not Specified</option>
                        <option value="Books">Books</option>
                        <option value="Movies">Movies</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Toys">Toys</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Misc.</legend>
                <div class = "form-group">
                    <label for="iventoryAmount">Inventory Amount</label>
                    <input type="number" name="inventoryAmount" id="inventoryAmount" required>
                </div>

                <div class = "form-group">
                    <label for="listPrice">List Price</label>
                    <input type="number" name="listPrice" id="listPrice" required>
                </div>

                <div class = "form-group">
                    <label>Available Stores</label>
                    <div class="option">
                        <label><input type="checkbox" name="availableStore[]" value="Bangkok">Bangkok</label>
                        <label><input type="checkbox" name="availableStore[]" value="Pattaya">Pattaya</label>
                        <label><input type="checkbox" name="availableStore[]" value="Phuket">Phuket</label>
                    </div>
                </div>

                <div class = "form-group">
                    <label>Available Stores</label>
                    <div class="options">
                        <label><input type="radio" name="status" value="active">Active</label>
                        <label><input type="radio" name="status" value="inactive">Inactive</label>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Staff</legend>
                <div class = "form-group">
                    <label for="staffEmail">Staff Email</label>
                    <input type="email" name="staffEmail" id="staffEmail" required>
                </div>
            </fieldset>

            <div class = "submit">
                <button type="submit">Submit</button>
            </div>
        </form>
    </body>
</html>
